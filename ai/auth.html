<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Smart Tutor Login | Paul Learning Center</title>
  <style>
    :root {
      --purple: #5b21b6;
      --purple-dark: #4c1d95;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --error: #b00020;
      --success: #0a7a2f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .auth-shell {
      width: min(1150px, 100%);
      min-height: 680px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }
    .auth-left {
      padding: 56px 42px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .auth-right {
      position: relative;
      border-left: 1px solid var(--border);
      background:
        linear-gradient(rgba(76, 29, 149, 0.65), rgba(91, 33, 182, 0.65)),
        url("../images/header-kids.jpg") center / cover no-repeat;
      color: #fff;
      padding: 56px 42px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 40px;
      line-height: 1.1;
      color: var(--purple);
    }
    .subtitle {
      margin: 0 0 34px 0;
      font-size: 17px;
      color: var(--muted);
      line-height: 1.5;
    }
    .form-title {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px 0;
    }
    .form-note {
      margin: 0 0 24px 0;
      color: var(--muted);
    }
    .field {
      width: 100%;
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #374151;
      font-weight: 600;
    }
    .field input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(91, 33, 182, 0.15);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn:hover { background: #f9fafb; }
    .btn.primary {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }
    .btn.primary:hover {
      background: var(--purple-dark);
      border-color: var(--purple-dark);
    }
    .auth-status {
      margin-top: 16px;
      min-height: 22px;
      font-weight: 600;
    }
    .auth-status.error { color: var(--error); }
    .auth-status.success { color: var(--success); }
    .mini-link {
      margin-top: 18px;
      font-size: 14px;
    }
    .mini-link a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 700;
    }
    .mini-link a:hover { text-decoration: underline; }
    .hero-heading {
      font-size: 36px;
      font-weight: 700;
      margin: 0 0 10px 0;
    }
    .hero-copy {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      opacity: 0.95;
      max-width: 430px;
    }
    @media (max-width: 980px) {
      .auth-shell { grid-template-columns: 1fr; }
      .auth-right {
        min-height: 260px;
        border-left: 0;
        border-top: 1px solid var(--border);
      }
      .auth-left { padding: 40px 26px; }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="auth-shell">
    <section class="auth-left">
      <h1>AI Smart Tutor</h1>
      <p class="subtitle">Paul Learning Center</p>

      <h2 class="form-title">Login or Sign Up</h2>
      <p class="form-note">Sign in to continue to your AI Learning dashboard.</p>

      <div class="field">
        <label for="authDisplayName">Display Name</label>
        <input id="authDisplayName" type="text" placeholder="Student name" />
      </div>
      <div class="field">
        <label for="authEmail">Email</label>
        <input id="authEmail" type="email" placeholder="student@example.com" />
      </div>
      <div class="field">
        <label for="authPassword">Password</label>
        <input id="authPassword" type="password" placeholder="Enter password" />
      </div>

      <div class="actions">
        <button id="authSignupBtn" class="btn primary" type="button">Sign Up</button>
        <button id="authLoginBtn" class="btn" type="button">Login</button>
      </div>

      <div id="authStatus" class="auth-status" aria-live="polite"></div>

      <div class="mini-link">
        <a href="../index.html">Back to Paul Learning Center</a>
      </div>
    </section>

    <section class="auth-right">
      <h2 class="hero-heading">Personalized Math Learning</h2>
      <p class="hero-copy">
        Homework Generator, Guided Tutor, and Student Progress tracking in one place.
      </p>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
</body>
</html>
